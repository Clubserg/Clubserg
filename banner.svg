<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>GitHub profile banner animado para Clubserg</title>
  <desc>Banner con nombre, título y partículas animadas estilo código</desc>
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .grid-line { stroke: #161b22; stroke-width: 0.5; fill: none; }
      .name { font-family: 'Courier New', monospace; font-size: 38px; font-weight: 700; fill: #e6edf3; }
      .sub { font-family: 'Courier New', monospace; font-size: 13px; fill: #8b949e; letter-spacing: 1px; }
      .tag  { font-family: 'Courier New', monospace; font-size: 11px; fill: #58a6ff; }
      .tag2 { font-family: 'Courier New', monospace; font-size: 11px; fill: #3fb950; }
      .tag3 { font-family: 'Courier New', monospace; font-size: 11px; fill: #d2a8ff; }

      @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes drift    { 0%{opacity:0;transform:translateY(0)} 30%{opacity:1} 100%{opacity:0;transform:translateY(-30px)} }
      @keyframes shimmer  { 0%,100%{opacity:0.3} 50%{opacity:0.9} }
      @keyframes slidein  { 0%{opacity:0;transform:translateX(-12px)} 100%{opacity:1;transform:translateX(0)} }
      @keyframes fadein   { 0%{opacity:0} 100%{opacity:1} }

      .cursor { fill: #58a6ff; animation: blink 1.1s step-end infinite; }

      .line1 { animation: slidein 0.5s ease 0.1s both; }
      .line2 { animation: slidein 0.5s ease 0.5s both; }
      .line3 { animation: slidein 0.5s ease 0.9s both; }
      .line4 { animation: slidein 0.5s ease 1.3s both; }
      .line5 { animation: slidein 0.5s ease 1.6s both; }

      .subtext { animation: fadein 0.8s ease 1.9s both; }
      .badges  { animation: fadein 0.8s ease 2.4s both; }

      .p1 { fill: #58a6ff;  font-family: 'Courier New', monospace; font-size: 11px; animation: drift 4s ease-in-out 0s   infinite; }
      .p2 { fill: #3fb950;  font-family: 'Courier New', monospace; font-size: 11px; animation: drift 5s ease-in-out 1s   infinite; }
      .p3 { fill: #d2a8ff;  font-family: 'Courier New', monospace; font-size: 11px; animation: drift 3.5s ease-in-out 0.5s infinite; }
      .p4 { fill: #58a6ff;  font-family: 'Courier New', monospace; font-size: 11px; animation: drift 6s ease-in-out 2s   infinite; }
      .p5 { fill: #3fb950;  font-family: 'Courier New', monospace; font-size: 11px; animation: drift 4.5s ease-in-out 1.5s infinite; }
      .p6 { fill: #d2a8ff;  font-family: 'Courier New', monospace; font-size: 11px; animation: drift 5.5s ease-in-out 0.8s infinite; }

      .s1 { animation: shimmer 3s ease-in-out 0s   infinite; }
      .s2 { animation: shimmer 4s ease-in-out 1s   infinite; }
      .s3 { animation: shimmer 2.5s ease-in-out 0.5s infinite; }
      .s4 { animation: shimmer 3.5s ease-in-out 1.5s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="680" height="200" rx="8"/>

  <!-- Grid -->
  <line class="grid-line" x1="0"   y1="40"  x2="680" y2="40"/>
  <line class="grid-line" x1="0"   y1="80"  x2="680" y2="80"/>
  <line class="grid-line" x1="0"   y1="120" x2="680" y2="120"/>
  <line class="grid-line" x1="0"   y1="160" x2="680" y2="160"/>
  <line class="grid-line" x1="136" y1="0"   x2="136" y2="200"/>
  <line class="grid-line" x1="272" y1="0"   x2="272" y2="200"/>
  <line class="grid-line" x1="408" y1="0"   x2="408" y2="200"/>
  <line class="grid-line" x1="544" y1="0"   x2="544" y2="200"/>

  <!-- Floating particles -->
  <text class="p1" x="580" y="50"  opacity="0">{}</text>
  <text class="p2" x="620" y="90"  opacity="0">&lt;/&gt;</text>
  <text class="p3" x="600" y="140" opacity="0">fn()</text>
  <text class="p4" x="640" y="30"  opacity="0">[]</text>
  <text class="p5" x="660" y="170" opacity="0">=&gt;</text>
  <text class="p6" x="555" y="60"  opacity="0">/**/</text>

  <!-- Stars -->
  <circle class="s1" cx="570" cy="25"  r="1.5" fill="#f0883e"/>
  <circle class="s2" cx="630" cy="55"  r="1"   fill="#d2a8ff"/>
  <circle class="s3" cx="655" cy="110" r="1.5" fill="#58a6ff"/>
  <circle class="s4" cx="590" cy="175" r="1"   fill="#3fb950"/>
  <circle class="s1" cx="550" cy="145" r="1"   fill="#f0883e"/>
  <circle class="s3" cx="670" cy="75"  r="1.5" fill="#3fb950"/>

  <!-- Code lines -->
  <text class="tag  line1" x="40" y="36">// Software Engineering Student</text>
  <text class="tag2 line2" x="40" y="58">const <tspan fill="#e6edf3">dev</tspan> = {</text>
  <text class="tag3 line3" x="40" y="78">  name: <tspan fill="#a5d6ff">"Sergio Fernández-Miranda"</tspan>,</text>
  <text class="tag  line4" x="40" y="98">  uni:  <tspan fill="#a5d6ff">"Universidad de Oviedo"</tspan></text>
  <text class="tag2 line5" x="40" y="118">};</text>

  <!-- Cursor -->
  <rect class="cursor" x="40" y="126" width="8" height="14" rx="1"/>

  <!-- Separator -->
  <line x1="40" y1="148" x2="520" y2="148" stroke="#21262d" stroke-width="0.5" fill="none"/>

  <!-- Tech badges -->
  <g class="badges">
    <rect x="40"  y="158" width="62" height="22" rx="11" fill="#0d2b1a" stroke="#3fb950" stroke-width="0.8"/>
    <text x="71"  y="173" text-anchor="middle" class="tag2" font-size="10">Node.js</text>

    <rect x="110" y="158" width="52" height="22" rx="11" fill="#0d1f2d" stroke="#58a6ff" stroke-width="0.8"/>
    <text x="136" y="173" text-anchor="middle" class="tag"  font-size="10">React</text>

    <rect x="170" y="158" width="80" height="22" rx="11" fill="#1a1a2e" stroke="#d2a8ff" stroke-width="0.8"/>
    <text x="210" y="173" text-anchor="middle" class="tag3" font-size="10">TypeScript</text>

    <rect x="258" y="158" width="58" height="22" rx="11" fill="#0d1f2d" stroke="#58a6ff" stroke-width="0.8"/>
    <text x="287" y="173" text-anchor="middle" class="tag"  font-size="10">Docker</text>

    <rect x="324" y="158" width="46" height="22" rx="11" fill="#2b1a0d" stroke="#f0883e" stroke-width="0.8"/>
    <text x="347" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#f0883e">Java</text>

    <rect x="378" y="158" width="44" height="22" rx="11" fill="#2b0d0d" stroke="#f85149" stroke-width="0.8"/>
    <text x="400" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#f85149">Rust</text>

    <rect x="430" y="158" width="72" height="22" rx="11" fill="#0d2b1a" stroke="#3fb950" stroke-width="0.8"/>
    <text x="466" y="173" text-anchor="middle" class="tag2" font-size="10">MongoDB</text>
  </g>

  <!-- Name -->
  <text class="name subtext" x="520" y="90"  text-anchor="middle">Clubserg</text>
  <text class="sub  subtext" x="520" y="112" text-anchor="middle">FULL STACK · SYSTEMS · SEC</text>
</svg>
