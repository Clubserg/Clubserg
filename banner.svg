<svg width="100%" viewBox="0 0 690 210" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>GitHub profile banner animado para Clubserg</title>
  <desc>Banner con nombre, título y partículas animadas estilo código</desc>

  <!-- Background -->
  <rect width="690" height="210" rx="8" fill="#0d1117"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="40"  x2="690" y2="40"  stroke="#161b22" stroke-width="0.5"/>
  <line x1="0" y1="80"  x2="690" y2="80"  stroke="#161b22" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="690" y2="120" stroke="#161b22" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="690" y2="160" stroke="#161b22" stroke-width="0.5"/>
  <!-- Grid lines vertical -->
  <line x1="136" y1="0" x2="136" y2="210" stroke="#161b22" stroke-width="0.5"/>
  <line x1="272" y1="0" x2="272" y2="210" stroke="#161b22" stroke-width="0.5"/>
  <line x1="408" y1="0" x2="408" y2="210" stroke="#161b22" stroke-width="0.5"/>
  <line x1="544" y1="0" x2="544" y2="210" stroke="#161b22" stroke-width="0.5"/>

  <!-- ===== FLOATING CODE PARTICLES (SMIL animate) ===== -->

  <!-- Particle 1: {} -->
  <text font-family="'Courier New', monospace" font-size="11" fill="#58a6ff">
    <animate attributeName="x" values="580;575;585;580" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="50;44;56;50"     dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.4;0" dur="4s" repeatCount="indefinite"/>
    {}
  </text>

  <!-- Particle 2: </> -->
  <text font-family="'Courier New', monospace" font-size="11" fill="#3fb950">
    <animate attributeName="x" values="620;615;625;620" dur="5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="90;84;96;90"     dur="5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.3;0" dur="5s" begin="0.8s" repeatCount="indefinite"/>
    &lt;/&gt;
  </text>

  <!-- Particle 3: fn() -->
  <text font-family="'Courier New', monospace" font-size="11" fill="#d2a8ff">
    <animate attributeName="x" values="600;595;605;600" dur="6s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="y" values="140;133;147;140" dur="6s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.4;0" dur="6s" begin="1.5s" repeatCount="indefinite"/>
    fn()
  </text>

  <!-- Particle 4: [] -->
  <text font-family="'Courier New', monospace" font-size="11" fill="#58a6ff">
    <animate attributeName="x" values="640;635;645;640" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="30;24;36;30"     dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.3;0" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
    []
  </text>

  <!-- Particle 5: => -->
  <text font-family="'Courier New', monospace" font-size="11" fill="#3fb950">
    <animate attributeName="x" values="660;655;665;660" dur="4.5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="170;163;177;170" dur="4.5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.3;0" dur="4.5s" begin="2s" repeatCount="indefinite"/>
    =&gt;
  </text>

  <!-- Particle 6: /**/ -->
  <text font-family="'Courier New', monospace" font-size="11" fill="#d2a8ff">
    <animate attributeName="x" values="555;550;560;555" dur="5.5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="60;53;67;60"     dur="5.5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.3;0" dur="5.5s" begin="1s" repeatCount="indefinite"/>
    /**/
  </text>

  <!-- ===== SHIMMER STARS ===== -->
  <circle cx="570" cy="25" r="1.5" fill="#f0883e">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="630" cy="55" r="1" fill="#d2a8ff">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.7s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="655" cy="110" r="1.5" fill="#58a6ff">
    <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="590" cy="175" r="1" fill="#3fb950">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="145" r="1" fill="#f0883e">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.1s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="670" cy="75" r="1.5" fill="#3fb950">
    <animate attributeName="opacity" values="0.1;1;0.1" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="612" cy="190" r="1" fill="#d2a8ff">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.9s" begin="0.9s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== LEFT: CODE BLOCK (fade-in staggered) ===== -->

  <!-- Line 1 -->
  <text font-family="'Courier New', monospace" font-size="11" fill="#58a6ff">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.1s" fill="freeze"/>
    <animate attributeName="x" values="20;40" dur="0.5s" begin="0.1s" fill="freeze"/>
    <tspan x="40" y="36">// Software Engineering Student</tspan>
  </text>

  <!-- Line 2 -->
  <text font-family="'Courier New', monospace" font-size="11">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
    <animate attributeName="x" values="20;40" dur="0.5s" begin="0.4s" fill="freeze"/>
    <tspan x="40" y="58" fill="#3fb950">const </tspan><tspan fill="#e6edf3">dev</tspan><tspan fill="#e6edf3"> = {</tspan>
  </text>

  <!-- Line 3 -->
  <text font-family="'Courier New', monospace" font-size="11">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.7s" fill="freeze"/>
    <animate attributeName="x" values="20;52" dur="0.5s" begin="0.7s" fill="freeze"/>
    <tspan x="52" y="78" fill="#d2a8ff">  name: </tspan><tspan fill="#a5d6ff">"Sergio Fernández-Miranda"</tspan><tspan fill="#e6edf3">,</tspan>
  </text>

  <!-- Line 4 -->
  <text font-family="'Courier New', monospace" font-size="11">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
    <animate attributeName="x" values="20;52" dur="0.5s" begin="1s" fill="freeze"/>
    <tspan x="52" y="98" fill="#58a6ff">  uni: </tspan><tspan fill="#a5d6ff">"Universidad de Oviedo"</tspan>
  </text>

  <!-- Line 5 -->
  <text font-family="'Courier New', monospace" font-size="11" fill="#3fb950">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.3s" fill="freeze"/>
    <animate attributeName="x" values="20;40" dur="0.5s" begin="1.3s" fill="freeze"/>
    <tspan x="40" y="118">};</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="40" y="126" width="8" height="13" rx="1" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="1.6s" repeatCount="indefinite"/>
  </rect>

  <!-- Separator -->
  <line x1="40" y1="148" x2="520" y2="148" stroke="#21262d" stroke-width="0.5"/>

  <!-- ===== TECH BADGES (staggered fade-in) ===== -->
  <!-- Node.js -->
  <g>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.8s" fill="freeze"/>
    <rect x="40" y="158" width="62" height="22" rx="11" fill="#0d2b1a" stroke="#3fb950" stroke-width="0.8"/>
    <text x="71" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#3fb950">Node.js</text>
  </g>
  <!-- React -->
  <g>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2s" fill="freeze"/>
    <rect x="110" y="158" width="52" height="22" rx="11" fill="#0d1f2d" stroke="#58a6ff" stroke-width="0.8"/>
    <text x="136" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#58a6ff">React</text>
  </g>
  <!-- TypeScript -->
  <g>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.2s" fill="freeze"/>
    <rect x="170" y="158" width="80" height="22" rx="11" fill="#1a1a2e" stroke="#d2a8ff" stroke-width="0.8"/>
    <text x="210" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#d2a8ff">TypeScript</text>
  </g>
  <!-- Docker -->
  <g>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.4s" fill="freeze"/>
    <rect x="258" y="158" width="58" height="22" rx="11" fill="#0d1f2d" stroke="#58a6ff" stroke-width="0.8"/>
    <text x="287" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#58a6ff">Docker</text>
  </g>
  <!-- Java -->
  <g>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.6s" fill="freeze"/>
    <rect x="324" y="158" width="46" height="22" rx="11" fill="#2b1a0d" stroke="#f0883e" stroke-width="0.8"/>
    <text x="347" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#f0883e">Java</text>
  </g>
  <!-- Rust -->
  <g>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.8s" fill="freeze"/>
    <rect x="378" y="158" width="44" height="22" rx="11" fill="#2b0d0d" stroke="#f85149" stroke-width="0.8"/>
    <text x="400" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#f85149">Rust</text>
  </g>
  <!-- MongoDB -->
  <g>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3s" fill="freeze"/>
    <rect x="430" y="158" width="72" height="22" rx="11" fill="#0d2b1a" stroke="#3fb950" stroke-width="0.8"/>
    <text x="466" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#3fb950">MongoDB</text>
  </g>

  <!-- ===== RIGHT: BIG NAME (fade + scale) ===== -->
  <text x="610" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="38" font-weight="700" fill="#e6edf3">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.2s" fill="freeze"/>
    Clubserg
  </text>
  <text x="610" y="112" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.6s" fill="freeze"/>
    FULL STACK · SYSTEMS · SEC
  </text>

</svg>
